syntax = "proto3";
package hammerprice.auction;

option java_multiple_files = true;
option java_package = "br.ufg.hammerprice.auction.grpc";
option java_outer_classname = "AuctionProto";

// Serviço de Leilão — núcleo concorrente (modelo round-based).
// PlaceBid (lance atômico na caixa da rodada), GetRoomState (rodada atual + caixa +
// odds públicas) e OpenBox (sorteio do item + quantidade pelo RNG do servidor, pelas
// odds públicas do tipo). Estado em memória; particionamento por sala por instância.
service Auction {
  rpc PlaceBid     (PlaceBidRequest) returns (PlaceBidReply);
  rpc GetRoomState (RoomQuery)       returns (RoomState);    // rodada atual + caixa + odds
  rpc OpenBox      (OpenBoxRequest)  returns (OpenBoxReply); // sorteio server-side
  rpc AdvanceRound (RoomQuery)       returns (AdvanceReply); // encerra o intervalo e abre já a próxima rodada
  rpc ForceClose   (RoomQuery)       returns (AdvanceReply); // fecha JÁ a rodada (todos passaram): o líder vence
  rpc SetRoundEffects (RoomEffects)  returns (AdvanceReply); // efeitos de cartas para a PRÓXIMA rodada
}

// Efeitos de cartas que valem para a próxima rodada (empurrados pelo gateway antes do advance).
message RoomEffects {
  string room_id = 1;
  repeated string double_loot = 2;   // jogadores cuja abertura rende o dobro de itens (Dobro)
  repeated string insured     = 3;   // jogadores sem penalidade de Mímico (Seguro)
  repeated string cursed      = 4;   // jogadores cuja vitória abre como Mímico (Maldição) — fase 2
  repeated string insight     = 5;   // jogadores que veem o drop antecipado (Visão) — fase 2
  repeated string gavel       = 6;   // fontes que dobram o incremento dos rivais (Martelo) — fase 2
  repeated DiscountEntry discounts = 7; // desconto no arremate por jogador (Desconto) — fase 2
  int32  box_tier_boost = 8;         // sobe o nível do baú (Reforço) — fase 2
}
message DiscountEntry { string player = 1; int32 pct = 2; }

message PlaceBidRequest {
  string room_id   = 1;
  string box_id    = 2;
  string player_id = 3;
  int64  amount    = 4;
}

message PlaceBidReply {
  bool   accepted    = 1;
  string reason      = 2;   // OK | INSUFFICIENT_BALANCE | OUTBID | TOO_LOW | UNKNOWN_BOX
  int64  current_bid = 3;
  string leader      = 4;
  int64  timer_ms    = 5;
}

// O VENCEDOR abre a caixa arrematada; o servidor sorteia o item.
message OpenBoxRequest {
  string room_id   = 1;
  string box_id    = 2;
  string player_id = 3;
}

message OpenBoxReply {
  bool   ok       = 1;
  string reason   = 2;   // OK | NOT_WINNER | UNKNOWN_BOX | ALREADY_OPENED
  string item     = 3;   // COPPER | SILVER | GOLD | DIAMOND | MIMIC
  bool   is_mimic = 4;   // armadilha (penalidade)
  int32  quantity = 5;   // 1..4 itens DO tipo sorteado (0 no Mímico)
}

message RoomQuery { string room_id = 1; }

message AdvanceReply { bool started = 1; }

message Box {
  string box_id      = 1;
  string box_type    = 2;            // WOODEN | IRON | ROYAL | VAULT (sorteado por rodada)
  int64  current_bid = 3;
  string leader      = 4;
  int64  timer_ms    = 5;
  map<string, int32> odds = 6;       // P pública por item (= a aplicada na abertura); soma 100
}

// Estado da sala = rodada atual + a caixa em leilão. `active` é false na pausa entre rodadas.
message RoomState {
  int32 round   = 1;
  bool  active  = 2;
  Box   box     = 3;
  int64 ends_at = 4;   // epoch ms em que o cronômetro da caixa zera
}
