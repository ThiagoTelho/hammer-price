syntax = "proto3";
package hammerprice.wallet;

option java_multiple_files = true;
option java_package = "br.ufg.hammerprice.wallet.grpc";
option java_outer_classname = "WalletProto";

// Carteira / Inventário — guardião da consistência forte.
// Reserve/Release/Settle sobre estado em memória; Redlock + transação Postgres
// entram numa etapa posterior (Fase 3). AddItem credita ao inventário o item
// sorteado na abertura da caixa.
service Wallet {
  rpc Reserve   (ReserveRequest)  returns (ReserveReply);
  rpc Release   (ReleaseRequest)  returns (Ack);
  rpc Settle    (SettleRequest)   returns (Ack);   // debita de fato (arremate da caixa)
  rpc AddItem   (AddItemRequest)  returns (Ack);   // credita o item ao inventário (abertura)
  rpc SellItem  (SellItemRequest) returns (SellReply);  // item livre -> dinheiro (preço de mercado)
  rpc FormCollection (FormCollectionRequest) returns (FormReply);  // trava itens numa coleção -> bônus
  rpc ResetPlayer (PlayerQuery)   returns (Ack);   // zera o jogador p/ uma nova partida (orçamento inicial)
  rpc ApplyMimic  (PlayerQuery)   returns (MimicReply);  // ao abrir 💀 Mímico: aplica 1 penalidade
  rpc BuyCard     (PlayerQuery)        returns (BuyCardReply);  // compra carta aleatória (preço crescente)
  rpc ConsumeCard (ConsumeCardRequest) returns (Ack);          // remove 1 carta da mão (ao jogar)
  rpc Transfer    (TransferRequest)    returns (TransferReply); // move dinheiro entre jogadores (Imposto)
  rpc GetPlayer (PlayerQuery)     returns (PlayerState);
}

message ReserveRequest {
  string player_id = 1;
  string box_id    = 2;
  int64  amount    = 3;
}

message ReserveReply {
  bool   ok       = 1;
  int64  balance  = 2;   // saldo total
  int64  reserved = 3;   // soma das reservas ativas
  string reason   = 4;   // OK | INSUFFICIENT_BALANCE | UNKNOWN_PLAYER
}

message ReleaseRequest {
  string player_id = 1;
  string box_id    = 2;
}

// Converte a reserva da caixa em débito definitivo (o vencedor paga ao arrematar).
message SettleRequest {
  string player_id   = 1;
  string box_id      = 2;
  int64  amount      = 3;   // valor arrematado; a carteira confere contra a reserva
  int32  discount_pct = 4;  // carta Desconto: % de abatimento no débito (0 = sem desconto)
}

message PlayerQuery { string player_id = 1; }

// Compra de carta (aleatória, preço crescente). A Carteira debita, sorteia pelos pesos e guarda.
message BuyCardReply {
  bool   ok      = 1;
  string reason  = 2;   // OK | INSUFFICIENT | HAND_FULL
  string card    = 3;   // tipo sorteado (vazio se !ok)
  int64  price   = 4;   // preço cobrado (ou o exigido, se INSUFFICIENT)
  int64  balance = 5;
}
message ConsumeCardRequest { string player_id = 1; string card = 2; }
message TransferRequest { string from_player = 1; string to_player = 2; int64 amount = 3; }
message TransferReply { bool ok = 1; int64 moved = 2; }   // moved = quanto efetivamente transferiu

// Penalidade do Mímico, sorteada entre roubar dinheiro, roubar um item ou anular uma coleção.
message MimicReply {
  string kind   = 1;   // MONEY | ITEM | COLLECTION | NONE
  string detail = 2;   // descrição legível (ex.: "100 de dinheiro", "1 GOLD", "coleção ROYAL_TRIO")
  int64  value  = 3;   // dinheiro roubado ou bônus anulado (0 para item)
}

// Credita um item ao inventário do jogador (chamado pelo Leilão na abertura da caixa).
// A Carteira gera o id do item; MIMIC não vira item (é penalidade — etapa posterior).
message AddItemRequest {
  string player_id = 1;
  string type      = 2;   // COPPER | SILVER | GOLD | DIAMOND
  int32  quantity  = 3;   // quantos itens desse tipo creditar (>= 1)
}

// Item do inventário. `state`: FREE (livre) | LOCKED_COLLECTION | CONSUMED (etapas futuras).
message Item {
  string id    = 1;   // itm-...
  string type  = 2;   // COPPER | SILVER | GOLD | DIAMOND
  string state = 3;   // FREE | LOCKED_COLLECTION | CONSUMED
}

// Vender um item LIVRE pelo preço de mercado atual. O gateway (que lê o mercado da
// réplica Redis) passa os preços; a Carteira escolhe pelo tipo REAL do item (anti-fraude)
// e cai no valor base se faltar.
message SellItemRequest {
  string player_id = 1;
  string item_id   = 2;
  map<string, int64> prices = 3;   // preço de mercado por tipo
}
message SellReply {
  bool   ok      = 1;
  string reason  = 2;   // OK | ITEM_NOT_FOUND | ITEM_LOCKED
  int64  price   = 3;   // valor creditado
  string type    = 4;   // tipo vendido
  int64  balance = 5;   // saldo após a venda
}

// Forma uma coleção: trava os itens LIVRES exigidos (state -> LOCKED_COLLECTION) e
// registra o bônus. Itens travados não podem ser vendidos/queimados.
message FormCollectionRequest { string player_id = 1; string kind = 2; }
message FormReply {
  bool   ok     = 1;
  string reason = 2;   // OK | NOT_ENOUGH | UNKNOWN_KIND
  int64  bonus  = 3;   // bônus da coleção formada
}

// Coleção formada por um jogador (bônus contabilizado no patrimônio final).
message Collection {
  string kind  = 1;   // COMMON_ALLOY | NOBLE_PAIR | RAINBOW | ROYAL_TRIO | LEGENDARY_VAULT
  int64  bonus = 2;
}

message PlayerState {
  string player_id = 1;
  int64  balance   = 2;
  int64  reserved  = 3;             // saldo "gastável" = balance - reserved
  repeated Item       inventory   = 4;   // itens obtidos ao abrir caixas
  repeated Collection collections = 6;   // coleções formadas (bônus)
  repeated string     cards          = 7;   // mão de cartas de habilidade (tipos)
  int64               next_card_price = 8;   // preço da próxima compra (crescente)
}

message Ack { bool ok = 1; }
