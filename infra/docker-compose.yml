# Hammer Price — orquestração local e base para o deploy AWS.
#
# Uso local (sobe tudo): a partir de infra/
#   docker compose --profile local up --build
#
# Perfis para o deploy AWS (uma fatia por máquina):
#   docker compose --profile node-a up    # EC2-A: infra + gateway + vault1 + shard1
#   docker compose --profile node-b up    # EC2-B: vault2 + shard2 + worker + réplica
#
# NOTA sobre o contexto de build: é a RAIZ do repositório (context: ..), porque os
# serviços Java e o gateway precisam de proto/ (fonte única dos contratos). Cada serviço
# aponta seu próprio dockerfile. Ver .dockerignore para o que fica de fora do contexto.

services:
  # ---------- Infraestrutura ----------
  redis:
    image: redis:7-alpine
    profiles: ["local", "node-a"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Réplica (read-only) do Redis: replicação do estado quente. As escritas vão ao primário
  # (`redis`) e são propagadas para cá; o gateway lê o snapshot de mercado DESTA réplica.
  redis-replica:
    image: redis:7-alpine
    profiles: ["local", "node-b"]
    command: ["redis-server", "--replicaof", "redis", "6379"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    profiles: ["local", "node-a"]
    ports: ["5672:5672", "15672:15672"]   # 15672 = console de gestão
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres-primary:
    image: postgres:16-alpine
    profiles: ["local", "node-a"]
    environment:
      POSTGRES_DB: hammerprice
      POSTGRES_USER: ${PG_USER:-hammer}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
    # Porta publicada no host é configurável (PG_PORT) para evitar conflito com um
    # Postgres local ou outro container. Os serviços internos usam postgres-primary:5432.
    ports: ["${PG_PORT:-5432}:5432"]
    volumes:
      - "pg_primary:/var/lib/postgresql/data"
      # Schema inicial aplicado na primeira subida (volume vazio). Ver docs/09.
      - "./db/init:/docker-entrypoint-initdb.d:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-hammer} -d hammerprice"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-replica:
    image: postgres:16-alpine
    # Apenas no node-b (deploy). A streaming replication apontando para a primary
    # é configurada na Fase 7 (ver docs/08-deploy-aws.md, passo 4).
    profiles: ["node-b"]
    environment:
      POSTGRES_DB: hammerprice
      POSTGRES_USER: ${PG_USER:-hammer}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
    depends_on: ["postgres-primary"]

  # ---------- Serviços de aplicação ----------
  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    profiles: ["local", "node-a"]
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      # Leituras do snapshot de mercado vão à RÉPLICA (replicação do estado quente).
      REDIS_REPLICA_URL: redis://redis-replica:6379
      # Particionamento por sala: cada sala é servida por uma instância de Leilão própria.
      # O gateway roteia as ações (gRPC) e o fan-out de eventos para a instância dona da sala.
      ROOM_ROUTES: "room-1=auction-vault1:50051,room-2=auction-vault2:50051"
      # Carteira por sala (mesma partição): de onde o gateway lê o HUD do jogador.
      WALLET_ROUTES: "room-1=wallet-shard1:50052,room-2=wallet-shard2:50052"
      # Duração da partida (o host também pode encerrar antes). Doc: 15 min; demo: menor.
      MATCH_DURATION_SECONDS: 180
      GATEWAY_PORT: 8080
    ports: ["8080:8080"]
    depends_on:
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_started
      auction-vault1:
        condition: service_started
      auction-vault2:
        condition: service_started

  auction-vault1:
    build:
      context: ..
      dockerfile: services/auction/Dockerfile
    profiles: ["local", "node-a"]
    restart: unless-stopped
    environment:
      AUCTION_ADDR: "50051"
      ROOM_ID: room-1                # esta instância é dona da sala room-1 (partição)
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq:5672
      WALLET_GRPC: wallet-shard1:50052
      BALANCE_CONFIG: /config/balance.yaml
    volumes:
      - "./config/balance.yaml:/config/balance.yaml:ro"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      wallet-shard1:
        condition: service_started

  auction-vault2:
    build:
      context: ..
      dockerfile: services/auction/Dockerfile
    profiles: ["local", "node-b"]
    restart: unless-stopped
    environment:
      AUCTION_ADDR: "50051"
      ROOM_ID: room-2                # esta instância é dona da sala room-2 (partição)
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq:5672
      WALLET_GRPC: wallet-shard2:50052
      BALANCE_CONFIG: /config/balance.yaml
    volumes:
      - "./config/balance.yaml:/config/balance.yaml:ro"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      wallet-shard2:
        condition: service_started

  wallet-shard1:
    build:
      context: ..
      dockerfile: services/wallet/Dockerfile
    profiles: ["local", "node-a"]
    restart: unless-stopped
    environment:
      WALLET_ADDR: "50052"
      SHARD_ID: shard-1
      PG_URL: postgres://hammer@postgres-primary:5432/hammerprice
      REDIS_URL: redis://redis:6379
      BALANCE_CONFIG: /config/balance.yaml
    volumes:
      - "./config/balance.yaml:/config/balance.yaml:ro"
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy

  wallet-shard2:
    build:
      context: ..
      dockerfile: services/wallet/Dockerfile
    profiles: ["local", "node-b"]
    restart: unless-stopped
    environment:
      WALLET_ADDR: "50052"
      SHARD_ID: shard-2
      BALANCE_CONFIG: /config/balance.yaml
    volumes:
      - "./config/balance.yaml:/config/balance.yaml:ro"

  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    profiles: ["local", "node-b"]
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://rabbitmq:5672
      REDIS_URL: redis://redis:6379
      # TODO Fase 7: no node-b passa a ler da réplica (postgres-replica).
      PG_URL: postgres://hammer@postgres-primary:5432/hammerprice
      BALANCE_CONFIG: /config/balance.yaml
    volumes:
      - "./config/balance.yaml:/config/balance.yaml:ro"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: services/frontend/Dockerfile
    profiles: ["local"]
    environment:
      # O navegador (host) fala com o gateway. Local: localhost:8080. No EC2 precisa ser
      # o DNS/IP PÚBLICO da instância (o navegador roda na máquina do jogador, não no host
      # do container) — o infra/deploy/start.sh detecta e injeta isso automaticamente.
      VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-ws://localhost:8080}
      # Base pública p/ as meta tags Open Graph (preview no WhatsApp etc.).
      VITE_PUBLIC_URL: ${VITE_PUBLIC_URL:-http://localhost:5173}
    ports: ["5173:5173"]
    depends_on:
      gateway:
        condition: service_started
    # Em produção o frontend é build estático em S3+CloudFront (ver docs/08).

volumes:
  pg_primary:
