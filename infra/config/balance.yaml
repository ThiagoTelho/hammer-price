# Hammer Price — parâmetros de balanceamento.
# Centralizados aqui para ajuste em playtest SEM recompilar serviços.
# Valores iniciais; ver docs/03-regras-de-negocio.md para a justificativa.

match:
  initial_budget: 1000
  duration_seconds: 900        # 15 min
  min_players: 2
  max_players: 15
  min_bid_increment_pct: 5
  min_bid_increment_abs: 5
  box_timer_seconds: 12         # cronômetro do leilão — começa SÓ no 1º lance
  no_bid_timeout_seconds: 45    # janela de abertura sem lances; sem lance até aqui, o lote
                                # fecha sem vencedor e a partida segue (não trava)
  antisnipe_window_seconds: 5
  antisnipe_reset_seconds: 8

round:                          # modelo round-based: UMA caixa por rodada
  boxes_per_round: 1
  intermission_max_seconds: 120 # TETO do intervalo entre rodadas; o gateway abre antes
                                # se todos os jogadores marcarem "pronto"
  box_type_weights:             # sorteio do baú a cada rodada — PROBABILIDADE IGUAL entre os 4
    WOODEN: 25                  # Baú de Madeira
    IRON:   25                  # Baú de Ferro
    ROYAL:  25                  # Baú Real
    VAULT:  25                  # Cofre

items:                          # valor base (preço de mercado flutua em torno disto)
  COPPER: 10                    # escada ~3×, acessível dentro do orçamento de 1000
  SILVER: 30
  GOLD: 100
  DIAMOND: 300
  # MIMIC: penalidade, não valor positivo

box_odds:                       # soma de cada baú = 100
  WOODEN:  { COPPER: 60, SILVER: 30, GOLD: 9,  DIAMOND: 1,  MIMIC: 0 }
  IRON:    { COPPER: 35, SILVER: 40, GOLD: 20, DIAMOND: 4,  MIMIC: 1 }
  ROYAL:   { COPPER: 15, SILVER: 30, GOLD: 40, DIAMOND: 12, MIMIC: 3 }
  VAULT:   { COPPER: 5,  SILVER: 15, GOLD: 35, DIAMOND: 40, MIMIC: 5 }

open:                           # ao abrir, o baú rende N itens DO MESMO tipo sorteado
  min_items: 1                  # (ex.: 3× Diamante) — camada extra de sorte; eleva o teto
  max_items: 4                  # de valor de um baú. Mímico continua penalidade única.

box_card_chance:                # chance (%) de o baú vir TAMBÉM com uma carta (ALÉM dos itens).
  WOODEN: 5                     # baús melhores trazem carta com mais frequência.
  IRON:   12                    # 0 = nunca; 100 = sempre. Sorteada na abertura; só em baú com
  ROYAL:  22                    # itens (Mímico não dá carta). A carta sorteada respeita os
  VAULT:  35                    # mesmos pesos de `cards.weights` e vai para a mão (até hand_max).

collections:                    # bônus ~2–3× o valor de mercado dos itens consumidos
  COPPER_TRIO:     { requires: { COPPER: 3 },                              bonus: 70 }
  SILVER_SET:      { requires: { SILVER: 3 },                              bonus: 230 }
  ALLOY:           { requires: { COPPER: 2, SILVER: 2 },                   bonus: 220 }
  SILVER_GOLD:     { requires: { SILVER: 2, GOLD: 1 },                     bonus: 400 }
  GOLD_TRIO:       { requires: { GOLD: 3 },                                bonus: 720 }
  RAINBOW:         { requires: { COPPER: 1, SILVER: 1, GOLD: 1, DIAMOND: 1 }, bonus: 1100 }
  DIAMOND_PAIR:    { requires: { DIAMOND: 2 },                             bonus: 1500 }
  ROYAL_FLUSH:     { requires: { SILVER: 1, GOLD: 1, DIAMOND: 2 },         bonus: 2000 }
  LEGENDARY_VAULT: { requires: { DIAMOND: 5 },                             bonus: 5000 }

mimic:                          # penalidade ao abrir uma caixa 💀 (sorteada na Carteira)
  steal_money_pct: 10           # quando a penalidade é MONEY: rouba 10% do saldo

cards:                          # cartas de habilidade (compradas com dinheiro; carta sorteada)
  base_price: 80                # preço da 1ª carta; sobe a cada compra (preço CRESCENTE)
  price_step: 40                # +40 por carta já comprada na partida (80, 120, 160…)
  hand_max: 4                   # teto da mão (máx. 4 cartas por vez)
  tax_amount: 25                # Imposto: cada rival paga isto ao autor
  double_loot_mult: 2           # Dobro: multiplicador de itens na abertura
  discount_pct: 30              # Desconto (fase 2): % de abatimento no arremate
  upgrade_tiers: 1              # Reforço (fase 2): quantos níveis o baú sobe
  weights:                      # chance de sortear cada carta (igual por padrão; ajustável)
    BLOCK: 10                   # Bloqueio: o alvo não dá lance na próxima rodada
    DOUBLE: 10                  # Dobro: sua abertura rende o dobro de itens
    TAX: 10                     # Imposto: cada rival te paga
    INSURANCE: 10               # Seguro: sem penalidade de Mímico
    DISCOUNT: 10                # Desconto: paga menos se vencer
    CURSE: 10                   # Maldição: se o alvo vencer, a caixa abre como Mímico
    UPGRADE: 10                 # Reforço: a caixa sobe um nível (odds melhores)
    SHIELD: 10                  # Escudo: imune a Bloqueio/Maldição/Imposto
    GAVEL: 10                   # Martelo: incremento mínimo dobrado p/ rivais
    INSIGHT: 10                 # Visão: vê o item que a caixa vai dar

market:
  recalc_interval_seconds: 5
  sensitivity_k: 0.5
  floor_multiplier: 0.4
  ceil_multiplier: 1.8
  target_supply: 5              # oferta-alvo por item; acima dela o preço cai (escassez relativa)

mimic:
  steal_money_pct: 10           # uma das penalidades possíveis
  # outras: roubar item aleatório, anular bônus de coleção

insurance:
  cost_pct_of_bid: 20
  penalty_reduction_pct: 70
